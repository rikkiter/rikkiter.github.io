<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон со скруглением 12px для премиального вида -->
  <rect width="64" height="64" rx="12" fill="#141414"/>
  
  <!-- Тонкая горизонтальная линия (горизонт/структура) -->
  <line x1="18" y1="36" x2="46" y2="36" stroke="#fadb14" stroke-width="1" stroke-opacity="0.5"/>
  
  <!-- Основной символ W, переходящий в архитектурную форму -->
